openapi: 3.1.0
info:
  title: DraftCheck WA — Stage 2 contract (frozen)
  description: |
    Frozen Stage 2 contract for routes owned by the Projects and Spatial agents.
    Frontend and Projects workers build against this stub from W1.
    Any deviation from these schemas requires a Stage 2 brief amendment first.

    **Safety invariants carried by every response:**
    - A geocode / address match is NEVER legal proof. Resolution status ∈
      {resolved, missing_info, needs_human_review, unsupported} is advisory only.
    - Every property fact carries provenance (dataset_id, method, licence_status).
    - `dwelling_type` is a proposal fact — it NEVER appears in PropertyProfileResponse.
  version: "2.0.0-stage2"

servers:
  - url: /api/v1
    description: V3 mount (single mount point, no aliases)

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: draftcheck_session
      description: HttpOnly signed session cookie issued by POST /auth/magic-link/verify

  schemas:

    # ── Error ──────────────────────────────────────────────────────────────────
    Problem:
      type: object
      description: RFC 9457 problem+json error
      required: [type, title, status]
      properties:
        type:    { type: string, format: uri }
        title:   { type: string }
        status:  { type: integer }
        detail:  { type: string }
        instance: { type: string }

    # ── Project ────────────────────────────────────────────────────────────────
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 240
          description: Human-readable project name.
        council_scope:
          type: string
          nullable: true
          maxLength: 200
          description: |
            Display-only council scope hint (e.g. "City of Vincent"). Does not
            override address resolution — the resolved LGA from spatial data is
            authoritative.

    ProjectResponse:
      type: object
      required: [id, org_id, name, status, created_at, updated_at]
      properties:
        id:           { type: string, format: uuid }
        org_id:       { type: string, format: uuid }
        name:         { type: string }
        status:       { type: string, example: draft }
        council_scope:
          type: string
          nullable: true
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }

    # ── Provenance ─────────────────────────────────────────────────────────────
    ProvenanceResponse:
      type: object
      required: [kind, method, target_crs]
      properties:
        kind:
          type: string
          enum: [spatial_dataset, manual_override]
        method:
          type: string
          description: |
            Resolution method. Examples: gnaf_exact_match, parcel_link,
            parcel_planning_feature_intersection, manual_override,
            point_in_polygon_fallback.
        target_crs:
          type: string
          example: EPSG:7844
          description: Always GDA2020 (EPSG:7844) for spatial data.
        dataset_id:
          type: string
          nullable: true
        source_version_id:
          type: string
          format: uuid
          nullable: true
        source_crs:
          type: string
          nullable: true
        licence_status:
          type: string
          nullable: true
          enum: [licensed, restricted, unlicensed, unknown, "null"]
        approval_status:
          type: string
          nullable: true
          enum: [approved, pending_review, rejected, "null"]
        manual_override_id:
          type: string
          nullable: true
        detail:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Property fact ──────────────────────────────────────────────────────────
    PropertyFactResponse:
      type: object
      required: [fact_id, fact_type, value, confidence, review_status, provenance]
      properties:
        fact_id:       { type: string }
        fact_type:
          type: string
          description: |
            One of: address | parcel | council | local_government | zone | r_code |
            overlay | bushfire | heritage | lot_area | lot_area_m2 | frontage |
            corner_lot | primary_street | secondary_street | lot_topology | easement
        value:
          description: Fact payload — shape varies by fact_type. Never contains dwelling_type.
        confidence:
          type: string
          enum: [high, medium, low, none]
        review_status: { type: string }
        provenance:    { $ref: "#/components/schemas/ProvenanceResponse" }

    # ── Property profile ───────────────────────────────────────────────────────
    PropertyProfileResponse:
      type: object
      required:
        - org_id
        - project_id
        - resolution_status
        - confidence
        - target_crs
        - issues
        - provenance
        - facts
      properties:
        org_id:           { type: string, format: uuid }
        project_id:       { type: string }
        resolution_status:
          type: string
          enum: [resolved, missing_info, needs_human_review, unsupported]
          description: |
            Advisory status. "resolved" means all required spatial facts were found with
            authoritative, licensed data. This is NOT legal proof of any property fact.
        confidence:
          type: string
          enum: [high, medium, low, none]
        address:
          type: string
          nullable: true
        address_point_id:
          type: string
          format: uuid
          nullable: true
        parcel_id:
          type: string
          format: uuid
          nullable: true
        local_government:
          type: string
          nullable: true
        target_crs:
          type: string
          example: EPSG:7844
        issues:
          type: array
          items: { type: string }
          description: Machine-readable issue keys explaining non-resolved status.
        provenance:
          type: array
          items: { $ref: "#/components/schemas/ProvenanceResponse" }
        facts:
          type: array
          items: { $ref: "#/components/schemas/PropertyFactResponse" }
          description: |
            Each fact has its own provenance. No fact without provenance is permitted.
            Facts never contain dwelling_type — that is a proposal fact.
        property_facts:
          type: array
          items: { $ref: "#/components/schemas/PropertyFactResponse" }
          description: Alias for facts (same data, kept for backward compatibility).

    # ── Manual override ────────────────────────────────────────────────────────
    ManualOverrideFactRequest:
      type: object
      required: [fact_type, value]
      properties:
        fact_type:
          type: string
          enum:
            - address
            - parcel
            - council
            - local_government
            - zone
            - r_code
            - overlay
            - bushfire
            - heritage
            - lot_area
            - lot_area_m2
            - frontage
            - corner_lot
            - primary_street
            - secondary_street
        value: {}
        source_note:
          type: string
          nullable: true
          maxLength: 500

    ManualOverrideRequest:
      type: object
      required: [reason]
      properties:
        override_id:
          type: string
          nullable: true
          maxLength: 120
        entered_by:
          type: string
          maxLength: 120
          default: unknown
        reason:
          type: string
          minLength: 1
          maxLength: 500
        address:
          type: string
          nullable: true
          maxLength: 500
        facts:
          type: array
          items: { $ref: "#/components/schemas/ManualOverrideFactRequest" }

    ResolveAddressRequest:
      type: object
      properties:
        address:
          type: string
          nullable: true
          maxLength: 500
        manual_override:
          $ref: "#/components/schemas/ManualOverrideRequest"
          nullable: true
          description: Requires reviewer role. Sets resolution_status to needs_human_review.

    # ── Property override (dedicated post-resolution endpoint) ─────────────────
    FactOverrideRequest:
      type: object
      required: [fact_type, value, reason]
      properties:
        fact_type:
          type: string
          enum:
            - address
            - parcel
            - council
            - local_government
            - zone
            - r_code
            - overlay
            - bushfire
            - heritage
            - lot_area
            - lot_area_m2
            - frontage
            - corner_lot
            - primary_street
            - secondary_street
        value: {}
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Required provenance note for audit trail.
        entered_by:
          type: string
          maxLength: 120
          nullable: true

    # ── Proposal ───────────────────────────────────────────────────────────────
    ProposalRequest:
      type: object
      description: |
        Wizard steps 1–3 capture. dwelling_type and other proposal facts live here,
        NEVER in the address/property profile. Idempotent: repeated POSTs upsert the
        proposal row (one proposal per project).
      properties:
        proposal_type:
          type: string
          nullable: true
          maxLength: 80
          example: residential
        dwelling_type:
          type: string
          nullable: true
          maxLength: 80
          description: |
            Proposal fact only. Examples: single_house, grouped_dwelling, multiple_dwelling.
            This field NEVER appears in PropertyProfileResponse.
          example: single_house
        building_class:
          type: string
          nullable: true
          maxLength: 40
          example: "1a"
        work_type:
          type: string
          nullable: true
          maxLength: 80
          example: new_construction
        new_or_existing:
          type: string
          nullable: true
          enum: [new, existing, null]
        lot_type:
          type: string
          nullable: true
          maxLength: 80
          example: green_title
        primary_street_confirmed:
          type: boolean
          default: false
        secondary_street_confirmed:
          type: boolean
          default: false

    ProposalResponse:
      type: object
      required: [id, org_id, project_id, created_at, updated_at]
      properties:
        id:           { type: string, format: uuid }
        org_id:       { type: string, format: uuid }
        project_id:   { type: string, format: uuid }
        proposal_type: { type: string, nullable: true }
        dwelling_type: { type: string, nullable: true }
        building_class: { type: string, nullable: true }
        work_type: { type: string, nullable: true }
        new_or_existing: { type: string, nullable: true }
        lot_type: { type: string, nullable: true }
        primary_street_confirmed: { type: boolean }
        secondary_street_confirmed: { type: boolean }
        source: { type: string, nullable: true }
        confidence: { type: number, format: float, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

paths:

  # ── Projects ────────────────────────────────────────────────────────────────
  /projects:
    post:
      operationId: createProject
      summary: Create project
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectResponse" }
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # ── Address resolution ──────────────────────────────────────────────────────
  /projects/{project_id}/resolve-address:
    post:
      operationId: resolveProjectAddress
      summary: Resolve address → parcel / council / zone / overlays + status
      description: |
        Resolution is advisory only. The returned resolution_status is one of
        {resolved, missing_info, needs_human_review, unsupported} and is NOT legal proof.
        Geocode coordinates in provenance detail are labelled "not legal proof."
        manual_override requires reviewer role and always sets resolution_status to
        needs_human_review.
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveAddressRequest" }
      responses:
        "200":
          description: Resolution result (may be missing_info or needs_human_review)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PropertyProfileResponse" }
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Reviewer role required for manual_override
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # ── Property profile ────────────────────────────────────────────────────────
  /projects/{project_id}/property:
    get:
      operationId: getProjectProperty
      summary: Get resolved PropertyProfile + facts + provenance
      description: Returns the last resolved profile for this project. Returns missing_info if not yet resolved.
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Property profile (may be missing_info)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PropertyProfileResponse" }
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # ── Manual property fact override ───────────────────────────────────────────
  /projects/{project_id}/property/override:
    post:
      operationId: overrideProjectPropertyFact
      summary: Manual fact override with required provenance
      description: |
        Adds or replaces a single property fact with a manually entered value.
        Requires reviewer role. Always records provenance (entered_by + reason).
        The override is recorded in property_facts with method=manual_override.
        Sets that fact's review_status to pending_review.
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FactOverrideRequest" }
      responses:
        "200":
          description: Overridden fact with provenance
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PropertyFactResponse" }
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "403":
          description: Reviewer role required
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Project not found
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  # ── Proposal (wizard steps 1–3) ─────────────────────────────────────────────
  /projects/{project_id}/proposal:
    post:
      operationId: upsertProjectProposal
      summary: Capture wizard steps 1–3 (idempotent upsert)
      description: |
        Creates or updates the proposal for this project. Idempotent: repeated POSTs
        upsert the single proposal row.

        IMPORTANT: dwelling_type and all proposal facts live here, NEVER in
        PropertyProfileResponse or property_facts. This enforces the V3 §5.2 invariant
        that address facts and proposal facts are separate.
      tags: [projects]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposalRequest" }
      responses:
        "200":
          description: Proposal upserted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposalResponse" }
        "401":
          description: Not authenticated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "404":
          description: Project not found
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
