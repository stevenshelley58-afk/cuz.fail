<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>cuz — property planning</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#1a3c34",
          "secondary": "#3c6756",
          "background": "#faf9f7",
          "surface": "#ffffff",
          "mint": "#e4f3ea",
          "mint-deep": "#cde9d9",
          "ink": "#1a1c1b",
          "ink-soft": "#414846",
          "ink-faint": "#717976",
          "line": "#eeeeec",
          "warn": "#b45309",
          "warn-bg": "#fef3e2"
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          heading: ['Sora', 'sans-serif'],
        }
      }
    }
  }
</script>
<style type="text/tailwindcss">
  @layer base {
    body {
      @apply bg-background text-ink font-sans antialiased selection:bg-mint-deep;
      -webkit-tap-highlight-color: transparent;
    }
    h1, h2, h3, .heading {
      @apply font-heading tracking-[-0.03em];
    }
  }

  @layer components {
    .nav-item {
      @apply flex flex-col items-center justify-center gap-1 text-ink-faint transition-colors duration-200;
    }
    .nav-item.active {
      @apply text-primary;
    }
    .nav-item.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1;
    }

    .chat-bubble-q {
      @apply bg-primary text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] self-end shadow-sm;
    }
    .chat-bubble-a {
      @apply bg-surface border border-line rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] self-start shadow-sm leading-relaxed;
    }

    .status-dot {
      @apply w-2 h-2 rounded-full;
    }
    .status-dot.flag { @apply bg-warn; }
    .status-dot.ok { @apply bg-secondary; }
    .status-dot.wait { @apply bg-ink-faint/30; }

    .pill {
      @apply px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap border;
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  }

  #main-viewport {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="main-viewport">
<header class="flex-none bg-background/80 backdrop-blur-md border-line z-30 px-6 h-16 flex items-center sticky top-0">
<div class="w-full max-w-2xl mx-auto flex items-center justify-between">
<div class="text-primary font-heading font-extrabold text-xl tracking-tighter">cuz<span class="text-secondary font-semibold">.fail</span></div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 bg-surface border border-line rounded-full px-3 py-1.5 shadow-sm text-sm font-medium transition-all active:bg-line" id="project-switcher-btn">
<span id="current-project-label">Banksia St</span>
<span class="material-symbols-outlined text-[18px]">unfold_more</span>
</button>
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-xs">G</div>
</div>
</div>
</header>
<div class="fixed inset-0 z-50 bg-black/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" id="project-menu">
<div class="absolute bottom-0 inset-x-0 bg-surface rounded-t-[32px] p-6 shadow-2xl transform translate-y-full transition-transform duration-300 max-h-[80vh] overflow-y-auto" id="project-menu-inner">
<div class="max-w-2xl mx-auto">
<div class="flex justify-between items-center mb-6">
<h3 class="text-xl font-heading font-bold">Projects</h3>
<button class="text-ink-faint" onclick="toggleProjectMenu()"><span class="material-symbols-outlined">close</span></button>
</div>
<div class="space-y-3" id="plist"></div>
<div class="mt-8 pt-6 border-t border-line">
<form class="flex gap-2" id="newproj">
<input class="flex-1 bg-background border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" id="newaddr" placeholder="Add new address..." type="text"/>
<button class="bg-primary text-white p-3 rounded-xl" type="submit"><span class="material-symbols-outlined">add</span></button>
</form>
</div>
</div>
</div>
</div>
<main class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar">
<div class="max-w-2xl mx-auto w-full">
<section class="px-6 pt-6 pb-4">
<div class="flex items-center gap-2 mb-1">
<div class="pill bg-mint text-primary border-mint-deep" id="status-pill"></div>
<div class="text-xs text-ink-faint font-medium" id="subline"></div>
</div>
<h1 class="text-3xl font-heading font-bold leading-tight text-primary mb-4" id="addr"></h1>
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2" id="chips"></div>
<div class="hidden mt-2 bg-surface border border-line rounded-2xl p-4" id="details"></div>
</section>
<div class="px-6 pb-24" id="pane-container">
<div class="pane active pb-28" id="ask">
<div class="chat flex flex-col gap-4 mb-6" id="chat"></div>
</div>
<div class="pane hidden" id="emails">
<div class="space-y-4 mb-6" id="mlist"></div>
</div>
<div class="pane hidden" id="drawings">
<div class="bg-mint/40 border-2 border-dashed border-mint-deep rounded-2xl p-6 text-center flex flex-col items-center gap-2 cursor-pointer active:bg-mint-deep/50 transition-colors" id="drop">
<span class="material-symbols-outlined text-3xl text-secondary">cloud_upload</span>
<div class="font-heading font-bold text-primary text-sm">Drop drawings here</div>
<p class="text-[11px] text-ink-faint">PDF · DWG · IFC</p>
</div>
<div class="mt-6 space-y-3" id="flist"></div>
</div>
<div class="pane hidden" id="checklist">
<div class="flex items-center justify-between mb-4">
<div class="text-sm font-medium text-ink-soft" id="clsum"></div>
<label class="flex items-center gap-2 text-xs font-semibold text-primary cursor-pointer">
<input class="rounded border-line text-primary focus:ring-primary" id="flagsonly" type="checkbox"/>
            Flags only
          </label>
</div>
<div class="space-y-2" id="clbody"></div>
</div>
</div>
</div>
</main>
<div class="hidden fixed inset-0 z-40 bg-surface overflow-y-auto" id="mview-wrap">
<div class="max-w-2xl mx-auto flex flex-col px-6 py-12" id="mview"></div>
</div>
<div class="flex-none bg-background/90 backdrop-blur-md px-6 py-4 border-t border-line absolute bottom-[72px] inset-x-0 z-20" id="ask-input-bar">
<form class="flex gap-2 max-w-2xl mx-auto" id="askform">
<input class="flex-1 bg-surface border border-line rounded-full px-5 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none shadow-sm" id="askinput" placeholder="Ask about this property..." type="text"/>
<button class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform" type="submit">
<span class="material-symbols-outlined">arrow_upward</span>
</button>
</form>
</div>
<nav class="flex-none bg-surface border-t border-line h-[72px] flex justify-center z-30">
<div class="grid grid-cols-4 px-2 w-full max-w-2xl">
<button class="nav-item active" data-pane="ask">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Ask</span>
</button>
<button class="nav-item" data-pane="emails">
<div class="relative">
<span class="material-symbols-outlined">mail</span>
<span class="absolute -top-1 -right-1 bg-warn text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden" id="mailcount">0</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Mail</span>
</button>
<button class="nav-item" data-pane="drawings">
<span class="material-symbols-outlined">architecture</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Plans</span>
</button>
<button class="nav-item" data-pane="checklist">
<div class="relative">
<span class="material-symbols-outlined">rule</span>
<span class="absolute -top-1 -right-1 bg-warn text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden" id="flagcount">0</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Rules</span>
</button>
</div>
</nav>
</div>
<script>
const DB = {
  banksia: {
    addr: "24 Banksia St, Mount Lawley",
    sub: "City of Stirling · Lot 42 on P12345 · 728 m²",
    status: ["flag", "RFI reply due Friday"],
    chips: [["Zone","R25"],["MRS","Urban"],["Bushfire","No"],["Heritage","No"]],
    warn: [],
    links: ["PlanWA","Landgate","LPS 3","LPP 6.1","R-Codes Vol 1"],
    chat: [
      {who:"q", text:"Max site coverage here?"},
      {who:"a", text:"60% — R25 requires minimum 40% open space under Table 1. Stirling LPP 6.1 doesn't vary it for this street.", cites:["R-Codes Vol 1 · Table 1","Stirling LPP 6.1 · cl 3.2"]}
    ],
    emails: [
      {from:"City of Stirling (Sarah K.)", subj:"RFI — DA24/0412, Lot 42 Banksia St", status:["warn","Reply due Fri"],
       body:"Please justify the proposed 4.5m front setback against the 6.0m requirement of LPP 6.1, and confirm the western boundary wall height.",
       draft:"Hi Sarah,\n\nThanks for the RFI on DA24/0412.\n\n1. Front setback — the proposed 4.5m relies on the averaging provision (cl 5.1.2): the adjoining dwellings at 22 and 26 Banksia St sit at 4.2m and 4.6m respectively (survey attached).\n\n2. Western boundary wall — 2.9m average height over 8.2m length, within the deemed-to-comply limits of cl 5.1.3 Table 2a for R25.\n\nHappy to discuss.\n\nRegards,\nGeorgia"},
      {from:"Mark & Jenny Hartley", subj:"Can the garage come forward a bit?", status:["info","Needs your input"],
       body:"Hi! We were wondering if the garage could come 500mm closer to the street so we get a longer backyard?",
       draft:"Hi Mark, Jenny,\n\nShort answer: not without a variation. The garage has to sit at or behind the dwelling's front setback line, and we're already relying on setback averaging at 4.5m.\n\nMoving it forward means a design-principles assessment with council — adds time and isn't guaranteed. The longer-backyard goal might be easier won by trimming the alfresco 300mm.\n\nWant me to sketch both options?\n\nGeorgia"}
    ],
    files: [
      {name:"Site Plan.pdf", ext:"PDF", tier:"read", when:"2h ago"},
      {name:"Floor Plan.dwg", ext:"DWG", tier:"measured", when:"2h ago"},
      {name:"Elevations_V2.pdf", ext:"PDF", tier:"read", when:"2h ago"}
    ],
    checklist: [
      {rule:"Open space", req:"≥ 50%", prop:"54%", src:"measured", st:"pass"},
      {rule:"Site coverage", req:"≤ 50%", prop:"48%", src:"measured", st:"pass"},
      {rule:"Front setback", req:"6.0 m (LPP 6.1)", prop:"4.5 m", src:"read", st:"flag", note:"Averaging may apply — cl 5.1.2. Survey of 22 & 26 Banksia attached to RFI draft."},
      {rule:"Side setback — east", req:"1.5 m", prop:"1.5 m", src:"measured", st:"pass"},
      {rule:"Side setback — west", req:"1.5 m", prop:"nil (boundary wall)", src:"measured", st:"flag", note:"Boundary wall allowed one side at R25 — check length/height vs Table 2a."},
      {rule:"Wall height", req:"≤ 6.0 m", prop:"5.4 m", src:"read", st:"pass"},
      {rule:"Open space behind front setback", req:"per Table 1", prop:"complies", src:"measured", st:"pass"},
      {rule:"Overshadowing (south lot)", req:"≤ 25%", prop:"—", src:"missing", st:"info", note:"Need southern neighbour's lot dimensions to compute June 21 shadow."},
      {rule:"Car parking", req:"2 bays", prop:"2 bays", src:"read", st:"pass"},
      {rule:"Visual privacy (cone of vision)", req:"4.5m / 6.0m", prop:"complies", src:"read", st:"pass"}
    ]
  },
  marri: {
    addr: "7 Marri Way, Duncraig",
    sub: "City of Joondalup · Lot 18 on D67890 · 690 m²",
    status: ["ok", "Checklist clean"],
    chips: [["Zone","R20"],["MRS","Urban"],["Bushfire","No"]],
    warn: [],
    links: ["PlanWA","Landgate","LPS 3 (Joondalup)"],
    chat: [
      {who:"q", text:"Minimum lot size if they ever subdivide?"},
      {who:"a", text:"R20 needs 350 m² minimum and 450 m² average per dwelling — at 690 m² this lot can't yield two compliant green-title lots.", cites:["R-Codes Vol 1 · Table 1"]}
    ],
    emails: [
      {from:"Dave Chen", subj:"Patio DA needed?", status:["ready","Draft ready"],
       body:"Do I need council approval for a 4x6m patio off the back?",
       draft:"Hi Dave,\n\nLikely no DA needed — an open patio under 30 m² behind the dwelling usually falls under the exemptions in the deemed-to-comply provisions.\n\nIt still needs a building permit — I'll confirm the side setback once you send the spot levels.\n\nGeorgia"}
    ],
    files: [{name:"Existing Site Survey.pdf", ext:"PDF", tier:"read", when:"yesterday"}],
    checklist: [
      {rule:"Open space", req:"≥ 50%", prop:"61%", src:"read", st:"pass"},
      {rule:"Front setback", req:"6.0 m", prop:"7.2 m", src:"read", st:"pass"}
    ]
  },
  wandoo: {
    addr: "Lot 12 Wandoo Rise, Baldivis",
    sub: "City of Rockingham · Lot 12 on DP401122 · 512 m²",
    status: ["wait", "Waiting on BAL report"],
    chips: [["Zone","R30"],["MRS","Urban"]],
    warn: [["Bushfire","BAL-19 likely"]],
    links: ["PlanWA","Landgate","TPS 2 (Rockingham)","DFES BAL Map"],
    chat: [],
    emails: [],
    files: [{name:"Concept Plan.dxf", ext:"DXF", tier:"measured", when:"3d ago"}],
    checklist: [
      {rule:"Site area", req:"260–300 m² (R30)", prop:"512 m² single", src:"measured", st:"pass"},
      {rule:"BAL assessment", req:"Required (SPP 3.7)", prop:"—", src:"missing", st:"info", note:"Lot is in a designated bushfire-prone area. Order BAL report before lodgement."}
    ]
  }
};

let current = "banksia";
const $ = id => document.getElementById(id);

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function toggleProjectMenu() {
  const menu = $('project-menu');
  const inner = $('project-menu-inner');
  if (menu.classList.contains('pointer-events-none')) {
    menu.classList.remove('opacity-0', 'pointer-events-none');
    inner.classList.remove('translate-y-full');
  } else {
    menu.classList.add('opacity-0', 'pointer-events-none');
    inner.classList.add('translate-y-full');
  }
}

$('project-switcher-btn').addEventListener('click', toggleProjectMenu);

function toggleDetails(){ $('details').classList.toggle('hidden'); }

function renderSidebar(){
  $('plist').innerHTML = Object.entries(DB).map(([id,p]) => `
    <button class="w-full flex items-center justify-between p-4 rounded-2xl border ${id===current?'border-primary bg-mint/30':'border-line bg-surface'} text-left" onclick="switchProject('${id}')">
      <div>
        <div class="font-bold text-ink">${esc(p.addr)}</div>
        <div class="text-[11px] text-ink-faint flex items-center gap-1.5 mt-1">
          <span class="status-dot ${p.status[0]}"></span>${esc(p.status[1])}
        </div>
      </div>
      ${id===current ? '<span class="material-symbols-outlined text-primary">check_circle</span>' : ''}
    </button>`).join('');
}

function renderHead(p){
  $('addr').textContent = p.addr;
  $('current-project-label').textContent = p.addr.split(',')[0];
  $('subline').textContent = p.sub;
  $('status-pill').className = `pill ${p.status[0] === 'flag' ? 'bg-warn-bg text-warn border-warn/20' : 'bg-mint text-primary border-mint-deep'}`;
  $('status-pill').textContent = p.status[1];

  const zone = p.chips.filter(([k]) => k === 'Zone');
  const rest = p.chips.filter(([k]) => k !== 'Zone');
  $('chips').innerHTML =
    zone.map(([k,v]) => `<span class="pill bg-surface border-line text-ink-soft">${k}: <b class="text-ink">${v}</b></span>`).join('') +
    p.warn.map(([k,v]) => `<span class="pill bg-warn-bg border-warn/20 text-warn">${k}: <b>${v}</b></span>`).join('') +
    ((rest.length || p.links.length) ? `<button class="pill bg-surface border-line text-ink-soft flex items-center gap-1" onclick="toggleDetails()">Details <span class="material-symbols-outlined text-[14px]">expand_more</span></button>` : '');

  $('details').classList.add('hidden');
  $('details').innerHTML =
    (rest.length ? `<div class="grid grid-cols-2 gap-x-8 gap-y-2 mb-3">` +
      rest.map(([k,v]) => `<div class="flex justify-between text-xs"><span class="text-ink-faint">${esc(k)}</span><span class="font-semibold">${esc(v)}</span></div>`).join('') +
      `</div>` : '') +
    (p.links.length ? `<div>` + p.links.map(l => `<a class="pill bg-mint/40 border-mint-deep text-secondary inline-flex items-center gap-1 mr-1.5 mb-1.5" href="#" onclick="return false">${esc(l)} <span class="material-symbols-outlined text-[12px]">north_east</span></a>`).join('') + `</div>` : '');
}

function renderChat(p){
  $('chat').innerHTML = p.chat.map(m => m.who==='q'
    ? `<div class="chat-bubble-q heading text-sm">${esc(m.text)}</div>`
    : `<div class="chat-bubble-a text-sm">
         ${esc(m.text)}
         ${m.cites ? `<button class="flex items-center gap-1 text-[10px] font-bold text-secondary mt-2" onclick="this.nextElementSibling.classList.toggle('hidden')"><span class="material-symbols-outlined text-[13px]">menu_book</span>${m.cites.length} source${m.cites.length>1?'s':''}</button><div class="hidden mt-1">${m.cites.map(c=>`<span class="pill bg-mint/50 border-mint-deep text-primary text-[10px] inline-flex mr-1.5 mb-1.5">${esc(c)}</span>`).join('')}</div>` : ''}
       </div>`).join('');
}

function renderEmails(p){
  $('mailcount').textContent = p.emails.length || '';
  $('mailcount').style.display = p.emails.length ? 'flex' : 'none';
  if (!p.emails.length){
    $('mlist').innerHTML = `<div class="py-12 text-center text-ink-faint text-sm">No emails yet.</div>`;
    return;
  }
  $('mlist').innerHTML = p.emails.map((m,i)=>`
    <button class="w-full bg-surface border border-line rounded-2xl p-4 text-left shadow-sm active:scale-[0.98] transition-transform" onclick="pickMail(${i})">
      <div class="flex justify-between items-start mb-2">
        <div class="font-bold text-sm text-primary">${esc(m.from)}</div>
        <span class="pill text-[9px] ${m.status[0]==='warn'?'bg-warn-bg text-warn':'bg-mint text-primary'}">${esc(m.status[1])}</span>
      </div>
      <div class="text-xs font-semibold text-ink-soft mb-1">${esc(m.subj)}</div>
      <div class="text-[11px] text-ink-faint truncate">${esc(m.body)}</div>
    </button>`).join('');
}

function pickMail(i){
  const m = DB[current].emails[i];
  $('mview').innerHTML = `
    <button onclick="closeMail()" class="mb-6 self-start text-primary flex items-center gap-2 font-bold text-sm">
      <span class="material-symbols-outlined">arrow_back</span> Back
    </button>
    <div class="mb-8 pb-8 border-b border-line">
      <div class="text-xs text-ink-faint mb-2">From ${esc(m.from)}</div>
      <h2 class="text-xl font-heading font-bold text-primary mb-4">${esc(m.subj)}</h2>
      <div class="text-sm leading-relaxed text-ink-soft bg-background p-4 rounded-2xl italic">"${esc(m.body)}"</div>
    </div>
    <div>
      <div class="flex justify-between items-end mb-4">
        <span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Draft reply</span>
        <button class="bg-primary text-white text-[10px] font-bold py-1.5 px-4 rounded-full" onclick="copyDraft(this)">Copy</button>
      </div>
      <div class="draft text-sm leading-relaxed whitespace-pre-line p-4 border border-line rounded-2xl shadow-sm">${esc(m.draft)}</div>
    </div>
  `;
  $('mview-wrap').classList.remove('hidden');
}

function closeMail() { $('mview-wrap').classList.add('hidden'); }

function renderFiles(p){
  $('flist').innerHTML = p.files.map(f=>`
    <div class="flex items-center gap-4 bg-surface border border-line rounded-2xl p-4 shadow-sm">
      <div class="w-10 h-10 rounded-xl bg-background flex items-center justify-center font-black text-[10px] text-primary">${f.ext}</div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-sm truncate">${esc(f.name)}</div>
        <div class="text-[10px] text-ink-faint">${f.when} · <span class="${f.tier==='measured'?'text-secondary font-bold':'text-ink-soft'}">${f.tier}</span></div>
      </div>
    </div>`).join('');
}

function renderChecklist(p){
  const flagsOnly = $('flagsonly').checked;
  const rows = p.checklist.filter(r => !flagsOnly || r.st!=='pass');
  const flags = p.checklist.filter(r=>r.st==='flag' && !r.reviewed).length;
  const pass  = p.checklist.filter(r=>r.st==='pass').length;

  $('flagcount').textContent = flags || '';
  $('flagcount').style.display = flags ? 'flex' : 'none';
  $('clsum').innerHTML = `<b>${pass} passed</b> · ${flags} flagged`;

  $('clbody').innerHTML = rows.map((r,idx)=>`
    <div class="bg-surface border border-line rounded-xl overflow-hidden">
      <button class="w-full flex items-center justify-between gap-3 px-4 py-3 text-left" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="text-sm font-semibold ${r.st==='flag' && !r.reviewed ? 'text-warn' : 'text-ink'}">${esc(r.rule)}</span>
        <span class="flex items-center gap-2 flex-none">
          <span class="text-xs text-ink-faint">${esc(r.prop)}</span>
          <span class="material-symbols-outlined text-[18px] ${r.st==='pass'?'text-secondary':r.st==='flag'?(r.reviewed?'text-secondary':'text-warn'):'text-ink-faint'}">${r.st==='pass'?'check_circle':r.st==='flag'?(r.reviewed?'verified':'flag'):'help'}</span>
        </span>
      </button>
      <div class="hidden px-4 pb-4 pt-3 border-t border-line">
        <div class="grid grid-cols-2 gap-4 mb-3">
          <div><div class="text-[9px] text-ink-faint uppercase">Required</div><div class="text-xs font-bold">${esc(r.req)}</div></div>
          <div><div class="text-[9px] text-ink-faint uppercase">Proposed</div><div class="text-xs font-bold">${esc(r.prop)}</div></div>
        </div>
        ${r.note ? `<div class="text-[11px] text-ink-soft bg-background/50 p-2 rounded-lg mb-3 italic">${esc(r.note)}</div>` : ''}
        <div class="flex items-center justify-between">
          <span class="pill text-[8px] bg-line text-ink-faint border-transparent">${r.src}</span>
          ${r.st==='flag' ? (r.reviewed
            ? `<span class="text-[10px] text-secondary font-bold">Resolved</span>`
            : `<button onclick="markReviewed('${esc(r.rule)}')" class="text-[10px] font-bold text-warn border border-warn/20 px-3 py-1 rounded-full active:bg-warn active:text-white">Resolve</button>`) : ''}
        </div>
      </div>
    </div>`).join('') || `<div class="py-12 text-center text-ink-faint text-sm">Nothing flagged.</div>`;
}

function renderAll(){
  const p = DB[current];
  renderSidebar(); renderHead(p); renderChat(p); renderEmails(p); renderFiles(p); renderChecklist(p);
}

function switchProject(id){
  current=id;
  toggleProjectMenu();
  renderAll();
  closeMail();
}

document.querySelectorAll('.nav-item').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.add('hidden'));
  t.classList.add('active');
  const paneId = t.dataset.pane;
  $(paneId).classList.remove('hidden');
  if (paneId === 'ask') {
    $('ask-input-bar').classList.remove('hidden');
  } else {
    $('ask-input-bar').classList.add('hidden');
  }
}));

function demoAnswer(q){
  const s = q.toLowerCase();
  if (/setback/.test(s)) return {
    text:"Primary street setback is 6.0m here under the local planning policy. Averaging can reduce it where adjoining dwellings sit closer to the street.",
    cites:["Stirling LPP 6.1","R-Codes Vol 1 · cl 5.1.2"]};
  if (/coverage|open space/.test(s)) return {
    text:"R25 requires a minimum 40% open space — so site coverage tops out at 60% unless the local policy varies it.",
    cites:["R-Codes Vol 1 · Table 1"]};
  if (/shadow|overshadow/.test(s)) return {
    text:"At R25 the shadow cast at midday on 21 June can't exceed 25% of the southern neighbour's lot. A shadow diagram is only needed if the proposal could approach that.",
    cites:["R-Codes Vol 1 · cl 5.4.2"]};
  if (/boundary wall/.test(s)) return {
    text:"One boundary wall is generally acceptable at R25 within the deemed-to-comply height and length limits of Table 2a — check the wall's average height against it.",
    cites:["R-Codes Vol 1 · cl 5.1.3 · Table 2a"]};
  if (/subdiv|lot size/.test(s)) return {
    text:"Minimum and average site areas per dwelling come from Table 1 for the density code — check the zone chip above, then the table.",
    cites:["R-Codes Vol 1 · Table 1"]};
  return {
    text:"Prototype — the live version answers this from the cited source library, or tells you it can't. No guessing.",
    cites:null};
}

$('askform').addEventListener('submit', e => {
  e.preventDefault();
  const q = $('askinput').value.trim();
  if(!q) return;
  DB[current].chat.push({who:'q', text:q});
  const a = demoAnswer(q);
  DB[current].chat.push({who:'a', text:a.text, cites:a.cites});
  $('askinput').value='';
  renderChat(DB[current]);
  $('chat').lastElementChild.scrollIntoView({behavior:'smooth'});
});

function copyDraft(btn){
  const txt = btn.closest('div').nextElementSibling.textContent;
  navigator.clipboard?.writeText(txt);
  btn.textContent = 'Copied!';
  setTimeout(()=>btn.textContent='Copy', 1500);
}

$('drop').addEventListener('click', () => {
  DB[current].files.unshift({name:"Latest Survey.pdf", ext:"PDF", tier:"queued", when:"just now"});
  renderFiles(DB[current]);
  setTimeout(()=>{ DB[current].files[0].tier='read'; renderFiles(DB[current]); }, 1600);
});

$('flagsonly').addEventListener('change', ()=>renderChecklist(DB[current]));

function markReviewed(rule){
  const r = DB[current].checklist.find(x=>x.rule===rule);
  if(r){ r.reviewed = true; renderChecklist(DB[current]); }
}

$('newproj').addEventListener('submit', e => {
  e.preventDefault();
  const a = $('newaddr').value.trim();
  if(!a) return;
  const id = 'p'+Date.now();
  DB[id] = {
    addr:a, sub:"Building dossier...", status:["wait","Looking up..."],
    chips:[], warn:[], links:[], chat:[], emails:[], files:[], checklist:[]
  };
  switchProject(id);
  $('newaddr').value='';
  setTimeout(()=>{
    DB[id].sub = "Dossier ready — demo data";
    DB[id].status = ["ok","Active"];
    DB[id].chips = [["Zone","R20"],["MRS","Urban"],["Bushfire","No"],["Sewer","Connected"]];
    DB[id].links = ["PlanWA","Landgate","Local Scheme","R-Codes Vol 1"];
    DB[id].chat = [{who:'a', text:"Dossier ready for "+a+". Ask away — answers carry their source.", cites:null}];
    if(current===id) renderAll();
  }, 1400);
});

renderAll();
</script>
</body>
</html>
