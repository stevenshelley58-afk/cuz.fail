# Local development stack — mirrors the V3 production shape (infra/v3/compose.yml):
# PostgreSQL (PostGIS + pgvector) + FastAPI api + Procrastinate worker.
# No redis, no minio, no local caddy — production serving is defined in infra/v3/.

name: draftcheck-wa-local

services:
  db:
    build:
      context: .
      dockerfile: infra/v3/db/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-draftcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PW:-local}
      POSTGRES_DB: ${POSTGRES_DB:-draftcheck}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - draftcheck-v3-db-healthcheck
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/v3/app.Dockerfile
    command:
      - sh
      - -c
      - >-
        alembic upgrade head &&
        (procrastinate --app "$${PROCRASTINATE_APP}" schema --apply ||
        echo "procrastinate schema already present; continuing") &&
        ([ "$${DRAFTCHECK_ENV}" != "production" ] && python scripts/dev_approve_sources.py || true) &&
        uvicorn draftcheck.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-draftcheck}:${POSTGRES_PW:-local}@db:5432/${POSTGRES_DB:-draftcheck}
      PROCRASTINATE_APP: ${PROCRASTINATE_APP:-draftcheck.jobs.procrastinate_app}
      PROCRASTINATE_DB_URI: postgresql://${POSTGRES_USER:-draftcheck}:${POSTGRES_PW:-local}@db:5432/${POSTGRES_DB:-draftcheck}
      OBJECT_STORAGE_ROOT: /app/.storage
      REQUIRE_DURABLE_DATABASE: "true"
      REQUIRE_LOCAL_CONTENT_STORAGE: "true"
      DRAFTCHECK_ENV: ${DRAFTCHECK_ENV:-local}
    volumes:
      - object_storage:/app/.storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ready', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/v3/app.Dockerfile
    command:
      - sh
      - -c
      - >-
        procrastinate --app "$${PROCRASTINATE_APP}" worker
        --queues default,source_ingestion,council_pack,rfi_analysis,source_freshness_audit,hermes,source_extraction
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-draftcheck}:${POSTGRES_PW:-local}@db:5432/${POSTGRES_DB:-draftcheck}
      PROCRASTINATE_APP: ${PROCRASTINATE_APP:-draftcheck.jobs.procrastinate_app}
      PROCRASTINATE_DB_URI: postgresql://${POSTGRES_USER:-draftcheck}:${POSTGRES_PW:-local}@db:5432/${POSTGRES_DB:-draftcheck}
      OBJECT_STORAGE_ROOT: /app/.storage
      REQUIRE_DURABLE_DATABASE: "true"
      REQUIRE_LOCAL_CONTENT_STORAGE: "true"
    volumes:
      - object_storage:/app/.storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  object_storage:
