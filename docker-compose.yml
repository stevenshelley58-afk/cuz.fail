name: draftcheck-wa-core

services:
  db:
    build:
      context: .
      dockerfile: infra/docker/db/Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-draftcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-draftcheck}
      POSTGRES_DB: ${POSTGRES_DB:-draftcheck}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - draftcheck-db-healthcheck
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-draftcheck}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-draftcheck-dev-only}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-draftcheck}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-draftcheck-dev-only}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/raw-sources &&
      mc mb --ignore-existing local/parsed-sources &&
      mc mb --ignore-existing local/uploads &&
      mc mb --ignore-existing local/exports &&
      mc anonymous set none local/raw-sources &&
      mc anonymous set none local/parsed-sources &&
      mc anonymous set none local/uploads &&
      mc anonymous set none local/exports
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-draftcheck}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-draftcheck}
      REQUIRE_DURABLE_DATABASE: "true"
      REQUIRE_DURABLE_OBJECT_STORAGE: "true"
      REDIS_URL: redis://redis:6379/0
      RQ_ENABLED: "true"
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUES: default,source_ingestion,council_pack,rfi_analysis,source_freshness_audit
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_CHAT_REQUESTS: ${RATE_LIMIT_CHAT_REQUESTS:-120}
      RATE_LIMIT_UPLOAD_REQUESTS: ${RATE_LIMIT_UPLOAD_REQUESTS:-20}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-draftcheck}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-draftcheck-dev-only}
      S3_BUCKET_RAW_SOURCES: ${S3_BUCKET_RAW_SOURCES:-raw-sources}
      S3_BUCKET_PARSED_SOURCES: ${S3_BUCKET_PARSED_SOURCES:-parsed-sources}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-uploads}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-exports}
      OBJECT_STORAGE_ROOT: /app/.storage
    volumes:
      - object_storage:/app/.storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: python -m draftcheck_worker.main
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-draftcheck}:${POSTGRES_PASSWORD:?required}@db:5432/${POSTGRES_DB:-draftcheck}
      REQUIRE_DURABLE_DATABASE: "true"
      REQUIRE_DURABLE_OBJECT_STORAGE: "true"
      REDIS_URL: redis://redis:6379/0
      RQ_ENABLED: "true"
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUES: default,source_ingestion,council_pack,rfi_analysis,source_freshness_audit
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-draftcheck}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-draftcheck-dev-only}
      OBJECT_STORAGE_ROOT: /app/.storage
    volumes:
      - object_storage:/app/.storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -m
        - draftcheck_worker.main
        - --check-ready
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      api:
        condition: service_healthy
    environment:
      CADDY_API_HOST: ${CADDY_API_HOST:-api.localhost}
      CADDY_APP_HOST: ${CADDY_APP_HOST:-app.localhost}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - static_frontend:/srv/cuz-frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  object_storage:
  static_frontend:
  caddy_data:
  caddy_config:
