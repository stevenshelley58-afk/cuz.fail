name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[dev]"
      - name: Repo hygiene guard
        run: python scripts/precommit_guard.py AGENTS.md README.md DATA_INVENTORY.md
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy new code
        run: python -m mypy src tests/test_v3_api_shell.py
      - name: Import contracts
        run: lint-imports --config pyproject.toml
      - name: Tests
        run: python -m pytest -q
      - name: Forbidden V3 patterns
        shell: bash
        run: |
          ! grep -RI "create_all" src web --exclude-dir=__pycache__
          ! grep -rIE "human.?review|NEEDS_HUMAN_REVIEW|human_review_required" src tests --exclude-dir=alembic --exclude-dir='*.egg-info' --exclude-dir=__pycache__
          # dev-login: a dev-only password login is intentionally present (operator
          # decision 2026-06-08) and is hard-disabled in production by app_env.
          # See src/draftcheck/api/auth.py:_dev_login_enabled and docs/MASTER_REBUILD_PLAN.md.

  migrations:
    # WP1 gate: upgrade head -> downgrade -1 -> upgrade head against the same
    # PostGIS+pgvector image production runs (infra/v3/db).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[dev]"
      - name: Start database
        run: |
          docker compose up -d --wait db
      - name: Migration roundtrip
        env:
          DATABASE_URL: postgresql+psycopg://draftcheck:local@localhost:5432/draftcheck
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web
        working-directory: web
        run: npm ci
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Verify launch surface
        working-directory: web
        env:
          VITE_CHECKOUT_URL: https://checkout.example.test/lotfile-ci
          VITE_PRICE_LABEL: AUD $29/month
          VITE_PRICE_SUBLABEL: Starter launch plan, cancel anytime.
        run: npm run verify:launch:strict
