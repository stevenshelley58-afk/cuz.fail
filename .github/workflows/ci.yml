name: CI

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + mypy
        run: pip install -e ".[dev]" mypy
      - name: Mypy
        run: mypy src/draftcheck/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://draftcheck:draftcheck@localhost:5432/draftcheck
    steps:
      - uses: actions/checkout@v4
      - name: Build and start postgres+postgis+pgvector
        run: |
          # Build a custom image so all packages (pgvector, postgis, postgres server)
          # are consistent at build time — avoids runtime .so version mismatches.
          docker build --tag testdb - << 'DOCKERFILE'
          FROM postgis/postgis:16-3.4
          RUN apt-get update -qq \
           && apt-get upgrade -y \
           && apt-get install -y --no-install-recommends postgresql-16-pgvector \
           && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run --detach --name testdb \
            --publish 5432:5432 \
            --env POSTGRES_USER=draftcheck \
            --env POSTGRES_PASSWORD=draftcheck \
            --env POSTGRES_DB=draftcheck \
            testdb
      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            docker exec testdb pg_isready -U draftcheck && break
            echo "postgres not ready yet ($i/30)"
            sleep 2
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Repo hygiene guard
        run: python scripts/precommit_guard.py AGENTS.md README.md DATA_INVENTORY.md VERCEL_AUDIT.md
      - name: Import contracts
        run: lint-imports --config pyproject.toml
      - name: Forbidden V3 patterns
        shell: bash
        run: |
          ! grep -R "create_all" src web
          ! grep -rE "human.?review|NEEDS_HUMAN_REVIEW|human_review_required" src tests --exclude-dir=alembic --exclude-dir='*.egg-info'
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -x -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web
        working-directory: web
        run: npm ci
      - name: Build web
        working-directory: web
        run: npm run build
