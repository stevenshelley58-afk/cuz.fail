name: CI

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + mypy
        run: pip install -e ".[dev]" mypy
      - name: Mypy
        run: mypy src/draftcheck/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: draftcheck
          POSTGRES_PASSWORD: draftcheck
          POSTGRES_DB: draftcheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://draftcheck:draftcheck@localhost:5432/draftcheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Repo hygiene guard
        run: python scripts/precommit_guard.py AGENTS.md README.md DATA_INVENTORY.md VERCEL_AUDIT.md
      - name: Import contracts
        run: lint-imports --config pyproject.toml
      - name: Forbidden V3 patterns
        shell: bash
        run: |
          ! grep -R "create_all" src web
          ! grep -rE "human.?review|NEEDS_HUMAN_REVIEW|human_review_required" src tests --exclude-dir=alembic --exclude-dir='*.egg-info'
      - name: Install pgvector into postgres service
        run: |
          PGCTR=$(docker ps -q --filter ancestor=postgis/postgis:16-3.4)
          # Upgrade all postgres packages together so .so files match the server binary,
          # then install pgvector, then restart postgres to pick up the new binary.
          docker exec "$PGCTR" bash -c "
            apt-get update -qq
            apt-get upgrade -y postgresql-16 postgresql-16-contrib postgresql-client-16
            apt-get install -y postgresql-16-pgvector
          "
          docker exec -u postgres "$PGCTR" \
            /usr/lib/postgresql/16/bin/pg_ctl restart -D /var/lib/postgresql/data -m fast -w -t 30
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -x -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web
        working-directory: web
        run: npm ci
      - name: Build web
        working-directory: web
        run: npm run build
