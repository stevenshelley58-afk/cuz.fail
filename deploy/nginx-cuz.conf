# Drop into /etc/nginx/sites-available/, symlink to sites-enabled, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.cuz.fail   (for TLS)
#
# Caddy users need one line instead:
#   api.cuz.fail { reverse_proxy 127.0.0.1:8088 }

server {
    listen 80;
    server_name api.cuz.fail;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
