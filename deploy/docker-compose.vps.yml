# DraftCheck WA Core — VPS deployment (alongside blockwise)
# Usage: docker compose -f deploy/docker-compose.vps.yml --project-name cuz up -d --build
# API binds to 127.0.0.1:8088 only — put your existing reverse proxy in front.

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8000"
    volumes:
      - cuz_storage:/app/.storage

volumes:
  cuz_storage:
