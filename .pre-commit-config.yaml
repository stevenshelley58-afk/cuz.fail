repos:
  - repo: local
    hooks:
      - id: draftcheck-repo-hygiene
        name: DraftCheck repo hygiene guard
        entry: python scripts/precommit_guard.py
        language: python
        pass_filenames: true
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.8.0
          - sqlalchemy>=2.0.0
